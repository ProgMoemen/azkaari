<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أذكاري</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap');

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Cairo", sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
            color: white;
            padding: 20px;
            direction: rtl;
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
            font-size: 42px;
            font-weight: bold;
            color: #f8fafc;
        }

        /* ===== BUTTONS ===== */
        .btns{
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 0 auto;
            max-width: 1000px;
        }

        .btn{
            background: #2563eb;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 20px 30px;
            border-radius: 15px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            flex: 1 1 200px; /* كل زر نفس الحجم */
            text-align: center;
        }

        .btn:hover{
            transform: translateY(-4px);
            background: #1e40af;
        }

        .btn span{
            display: block;
            font-size: 14px;
            color: #cbd5e1;
            margin-top: 6px;
        }

        footer{
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: #94a3b8;
        }

        footer a{
            color: #60a5fa;
            text-decoration: none;
        }

        footer a:hover{
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width:768px){
            .btns{
                flex-direction: column; /* يخليهم تحت بعض */
                align-items: stretch;
            }

            .btn{
                flex: 1 1 auto;
                width: 100%;
                font-size: 22px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <h1>أذكاري</h1>
    <section>
        <div class="btns">
            <button class="btn" id="azkar">الأذكار</button>
            <button class="btn" id="videos">فيديوهات العمرة</button>
            <button class="btn" id="yasin">سورة يس <span>بعد الفجر</span></button>
            <button class="btn" id="wakea">سورة الواقعة <span>بعد الظهر</span></button>
            <button class="btn" id="rahman">سورة الرحمن <span>بعد العصر</span></button>
            <button class="btn" id="dukhan">سورة الدخان <span>بعد المغرب</span></button>
            <button class="btn" id="mulk">سورة الملك <span>بعد العشاء</span></button>
            <button class="btn" id="kahf">سورة الكهف <span>يوم الجمعة</span></button>
        </div>
    </section>

    <footer>
        made by <a href="#">Mo'men</a>
    </footer>
    <script src="main.js"></script>
</body>
</html>
